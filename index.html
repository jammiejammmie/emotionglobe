<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>감정지구본</title>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Cormorant+Garamond:ital,wght@1,400;1,600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/globe.gl@2/dist/globe.gl.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #03050f; font-family: 'Gowun Dodum', sans-serif; color: white; }
#globeViz { width: 100vw; height: 100vh; position: relative; z-index: 2; }
#vignette { position: fixed; inset: 0; pointer-events: none; z-index: 3; background: radial-gradient(ellipse at center, transparent 45%, rgba(0,0,0,0.55) 100%); }
#particles { position: fixed; inset: 0; pointer-events: none; z-index: 4; opacity: 0.5; }

/* 타이틀 */
#title { position: fixed; top: 36px; left: 50%; transform: translateX(-50%); text-align: center; z-index: 20; pointer-events: none; }
#title h1 { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 15px; font-weight: 400; letter-spacing: 7px; margin: 0; color: rgba(255,255,255,0.22); text-transform: uppercase; }

/* 통계 */
#stats { position: fixed; top: 36px; right: 32px; text-align: right; z-index: 20; pointer-events: none; }
#stats .num { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 22px; line-height: 1; color: rgba(255,255,255,0.18); }
#stats .lbl { font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.12); margin-top: 2px; }

/* 유저 상태 */
#user-status { position: fixed; top: 32px; left: 32px; z-index: 20; }
#login-btn { background: transparent; border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 6px 14px; color: rgba(255,255,255,0.3); font-family: 'Gowun Dodum', sans-serif; font-size: 10px; cursor: pointer; letter-spacing: 1px; transition: all 0.3s; }
#login-btn:hover { border-color: rgba(255,255,255,0.2); color: rgba(255,255,255,0.6); }
#user-info { display: none; align-items: center; gap: 8px; }
#user-avatar { width: 26px; height: 26px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.15); opacity: 0.6; }
#user-name { font-size: 10px; color: rgba(255,255,255,0.3); letter-spacing: 0.5px; }
#logout-btn { font-size: 9px; color: rgba(255,255,255,0.2); cursor: pointer; background: none; border: none; letter-spacing: 1px; }
#logout-btn:hover { color: rgba(255,255,255,0.5); }

/* 감정 바 */
#emotions { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%); display: flex; gap: 4px; z-index: 20; background: rgba(255,255,255,0.025); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.05); border-radius: 50px; padding: 8px 14px; }
.em-btn { display: flex; flex-direction: column; align-items: center; gap: 2px; cursor: pointer; padding: 7px 9px; border-radius: 36px; border: 1px solid transparent; background: transparent; transition: all 0.25s ease; color: white; opacity: 0.55; }
.em-btn:hover { opacity: 0.9; background: rgba(255,255,255,0.05); transform: translateY(-2px); }
.em-btn.active { border-color: var(--c); opacity: 1; background: rgba(255,255,255,0.05); box-shadow: 0 0 16px var(--ch); transform: translateY(-3px); }
.em-btn .emo { font-size: 18px; line-height: 1; }
.em-btn .lbl { font-size: 8px; letter-spacing: 0.5px; opacity: 0; transition: opacity 0.2s; }
.em-btn:hover .lbl, .em-btn.active .lbl { opacity: 0.7; }

/* 힌트 */
#hint { position: fixed; bottom: 96px; left: 50%; transform: translateX(-50%); font-size: 10px; letter-spacing: 2px; color: rgba(255,255,255,0.2); text-align: center; z-index: 20; pointer-events: none; transition: all 0.5s; white-space: nowrap; }
#hint.hl { color: rgba(255,209,102,0.7); }

/* 토스트 */
#toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9); background: rgba(6,10,24,0.97); border: 1px solid rgba(255,255,255,0.07); border-radius: 20px; padding: 24px 32px; text-align: center; z-index: 100; opacity: 0; pointer-events: none; transition: all 0.3s cubic-bezier(.34,1.56,.64,1); min-width: 180px; }
#toast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
#toast .big { font-size: 44px; display: block; margin-bottom: 10px; }
#toast h3 { margin: 0 0 5px; font-size: 16px; font-weight: normal; color: rgba(255,255,255,0.85); }
#toast p { margin: 0; font-size: 10px; color: rgba(255,255,255,0.3); letter-spacing: 1.5px; }

/* 위로 패널 */
#warmth-panel { position: fixed; bottom: 130px; left: 50%; transform: translateX(-50%) translateY(16px); background: rgba(6,10,24,0.96); border: 1px solid rgba(255,200,80,0.15); border-radius: 18px; padding: 18px 26px; text-align: center; z-index: 50; opacity: 0; pointer-events: none; transition: all 0.3s cubic-bezier(.34,1.56,.64,1); min-width: 200px; }
#warmth-panel.show { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; }
#warmth-panel .wp-emoji { font-size: 28px; margin-bottom: 5px; }
#warmth-panel .wp-loc { font-size: 12px; font-weight: bold; margin-bottom: 3px; color: rgba(255,255,255,0.7); }
#warmth-panel .wp-txt { font-size: 9px; color: rgba(255,255,255,0.3); letter-spacing: 1.5px; margin-bottom: 12px; }
#wp-send { background: rgba(255,200,80,0.1); border: 1px solid rgba(255,200,80,0.3); border-radius: 18px; padding: 8px 18px; color: rgba(255,209,102,0.9); font-family: 'Gowun Dodum', sans-serif; font-size: 11px; cursor: pointer; transition: all 0.2s; }
#wp-send:hover { background: rgba(255,200,80,0.2); }
#wp-close { display: block; margin: 8px auto 0; background: none; border: none; color: rgba(255,255,255,0.2); font-size: 10px; cursor: pointer; letter-spacing: 1px; }

/* 스킨 패널 - 조용하고 작게 */
#skin-toggle {
  position: fixed; bottom: 32px; right: 28px; z-index: 20;
  width: 32px; height: 32px; border-radius: 50%;
  background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 13px; opacity: 0.4;
  transition: all 0.3s; color: rgba(255,255,255,0.6);
}
#skin-toggle:hover { opacity: 0.8; background: rgba(255,255,255,0.07); }
#skin-panel {
  position: fixed; bottom: 72px; right: 28px; z-index: 50;
  background: rgba(6,10,24,0.96); border: 1px solid rgba(255,255,255,0.07);
  border-radius: 16px; padding: 14px; min-width: 160px;
  opacity: 0; pointer-events: none; transform: translateY(8px);
  transition: all 0.25s ease;
}
#skin-panel.show { opacity: 1; pointer-events: auto; transform: translateY(0); }
#skin-panel .sp-title { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.25); margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.06); }
.skin-item { display: flex; align-items: center; gap: 8px; padding: 7px 8px; border-radius: 10px; cursor: pointer; transition: all 0.2s; }
.skin-item:hover { background: rgba(255,255,255,0.05); }
.skin-item.active { background: rgba(255,255,255,0.06); }
.skin-item.locked { opacity: 0.35; cursor: default; }
.skin-item .si-emoji { font-size: 16px; }
.skin-item .si-label { font-size: 11px; color: rgba(255,255,255,0.6); letter-spacing: 0.5px; flex: 1; }
.skin-item .si-lock { font-size: 9px; color: rgba(255,255,255,0.25); }
#skin-loading { position: fixed; bottom: 36px; right: 68px; z-index: 20; font-size: 9px; color: rgba(255,255,255,0.25); letter-spacing: 2px; opacity: 0; transition: opacity 0.3s; pointer-events: none; }

/* 로딩 */
#loading { position: fixed; inset: 0; background: #03050f; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200; transition: opacity 0.6s; }
#loading.hide { opacity: 0; pointer-events: none; }
#loading .spinner { width: 28px; height: 28px; border: 1px solid rgba(255,255,255,0.06); border-top-color: rgba(168,216,255,0.4); border-radius: 50%; animation: spin 1.5s linear infinite; margin-bottom: 16px; }
#loading p { font-size: 10px; letter-spacing: 4px; color: rgba(255,255,255,0.18); }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div><p>잠시만요</p></div>
<canvas id="particles"></canvas>
<div id="globeViz"></div>
<div id="vignette"></div>

<div id="title"><h1>감정지구본</h1></div>
<div id="stats"><div class="num" id="totalNum">—</div><div class="lbl">오늘의 감정</div></div>

<div id="user-status">
  <button id="login-btn">로그인</button>
  <div id="user-info">
    <img id="user-avatar" src="" alt="">
    <span id="user-name"></span>
    <button id="logout-btn">나가기</button>
  </div>
</div>

<div id="hint">감정을 선택하고 지구를 클릭해 기록해요</div>
<div id="emotions"></div>

<div id="warmth-panel">
  <div class="wp-emoji" id="wp-emoji">😢</div>
  <div class="wp-loc" id="wp-loc">이 지역</div>
  <div class="wp-txt">이곳에 따뜻한 빛을 보낼까요</div>
  <button id="wp-send">💛 위로 보내기</button>
  <button id="wp-close">닫기</button>
</div>

<!-- 스킨 패널 (조용한 설정 버튼) -->
<div id="skin-loading">로딩 중</div>
<button id="skin-toggle" title="테마 변경">◎</button>
<div id="skin-panel">
  <div class="sp-title">Earth Theme</div>
  <div id="skin-list"></div>
</div>

<div id="toast">
  <span class="big" id="tEmoji">😊</span>
  <h3 id="tTitle">기록됐어요</h3>
  <p id="tSub">내일 또 만나요</p>
</div>

<script>
// ─────────────────────────────────────────
// SKINS 구조 — 텍스처 URL 중앙 관리
// 나중에 스킨 추가 시 여기만 수정하면 됨
// ─────────────────────────────────────────
const STORAGE = 'https://utcufydzowykkuklrstw.supabase.co/storage/v1/object/public/textures'
// Supabase Storage 설정 전 fallback CDN
const CDN = 'https://cdn.jsdelivr.net/npm/three-globe/example/img'

const SKINS = {
  default: {
    label: 'Blue Marble',
    emoji: '🌍',
    locked: false,
    day:   `${STORAGE}/default/day.jpg`,
    night: `${STORAGE}/default/night.jpg`,
    bg:    `${STORAGE}/default/space.png`,
    fallback: {
      day:   `${CDN}/earth-blue-marble.jpg`,
      night: `${CDN}/earth-night.jpg`,
      bg:    `${CDN}/night-sky.png`,
    }
  },
  pixel: {
    label: 'Pixel Earth',
    emoji: '👾',
    locked: true,
    day:   `${STORAGE}/pixel/day.jpg`,
    night: `${STORAGE}/pixel/night.jpg`,
    bg:    `${STORAGE}/pixel/space.png`,
    fallback: null
  },
  minimal: {
    label: 'Minimal',
    emoji: '◌',
    locked: true,
    day:   `${STORAGE}/minimal/day.jpg`,
    night: `${STORAGE}/minimal/night.jpg`,
    bg:    `${STORAGE}/minimal/space.png`,
    fallback: null
  },
  watercolor: {
    label: 'Watercolor',
    emoji: '🎨',
    locked: true,
    day:   `${STORAGE}/watercolor/day.jpg`,
    night: `${STORAGE}/watercolor/night.jpg`,
    bg:    `${STORAGE}/watercolor/space.png`,
    fallback: null
  }
}

// ─────────────────────────────────────────
// 파티클
// ─────────────────────────────────────────
;(function() {
  const canvas = document.getElementById('particles')
  const ctx = canvas.getContext('2d')
  let W, H, pts = []
  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight }
  resize(); window.addEventListener('resize', resize)
  for (let i = 0; i < 80; i++) pts.push({ x:Math.random()*innerWidth, y:Math.random()*innerHeight, r:Math.random()*1.2+0.2, o:Math.random()*0.4+0.05, speed:Math.random()*0.08+0.01, drift:(Math.random()-0.5)*0.03, twinkle:Math.random()*Math.PI*2 })
  function draw() {
    ctx.clearRect(0,0,W,H)
    pts.forEach(p => {
      p.twinkle+=0.008; p.y-=p.speed; p.x+=p.drift
      if(p.y<-2)p.y=H+2; if(p.x<-2)p.x=W+2; if(p.x>W+2)p.x=-2
      const o=p.o*(0.5+0.5*Math.sin(p.twinkle))
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2)
      ctx.fillStyle=`rgba(200,220,255,${o})`; ctx.fill()
    })
    requestAnimationFrame(draw)
  }
  draw()
})()

// ─────────────────────────────────────────
// 메인
// ─────────────────────────────────────────
window.onload = async function() {
  // 최대 2.5초 후 무조건 로딩 해제 (안전장치)
  setTimeout(() => document.getElementById('loading').classList.add('hide'), 2500)

  const SUPABASE_URL = 'https://utcufydzowykkuklrstw.supabase.co'
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV0Y3VmeWR6b3d5a2t1a2xyc3R3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4ODAzNDUsImV4cCI6MjA5NTQ1NjM0NX0.XwiahS2BMQuThIWGntJeqRErqRGVhXH0Z-8WL39p0Ys'
  const { createClient } = supabase
  const db = createClient(SUPABASE_URL, SUPABASE_KEY)

  let currentUser = null
  const todayKey = new Date().toISOString().split('T')[0]

  function updateUserUI(user) {
    currentUser = user
    const lb = document.getElementById('login-btn'), ui = document.getElementById('user-info')
    if (user) {
      lb.style.display='none'; ui.style.display='flex'
      document.getElementById('user-avatar').src = user.user_metadata?.avatar_url||''
      document.getElementById('user-name').textContent = user.user_metadata?.full_name?.split(' ')[0]||''
    } else { lb.style.display='block'; ui.style.display='none' }
  }

  document.getElementById('login-btn').onclick = async () => {
    await db.auth.signInWithOAuth({ provider:'google', options:{ redirectTo:window.location.href } })
  }
  document.getElementById('logout-btn').onclick = async () => {
    await db.auth.signOut(); updateUserUI(null); showToast('👋','','')
  }

  const { data:{ session } } = await db.auth.getSession()
  if (session) updateUserUI(session.user)
  db.auth.onAuthStateChange((_,s) => updateUserUI(s?.user||null))

  async function hasPostedToday() {
    if (!currentUser) return localStorage.getItem('eg_posted') === todayKey
    const { data } = await db.from('emotion_posts').select('id').eq('user_id',currentUser.id).gte('created_at',todayKey+'T00:00:00Z').limit(1)
    return data && data.length > 0
  }

  const emotions = [
    { key:'joy',        label:'기쁨',  emoji:'😊', color:'#FFD166', ch:'rgba(255,209,102,.3)' },
    { key:'peace',      label:'평온',  emoji:'😌', color:'#06D6A0', ch:'rgba(6,214,160,.3)' },
    { key:'sad',        label:'슬픔',  emoji:'😢', color:'#5B8CDB', ch:'rgba(91,140,219,.3)' },
    { key:'anger',      label:'분노',  emoji:'😤', color:'#EF476F', ch:'rgba(239,71,111,.3)' },
    { key:'excitement', label:'설렘',  emoji:'🤩', color:'#FF70A6', ch:'rgba(255,112,166,.3)' },
    { key:'anxiety',    label:'불안',  emoji:'😰', color:'#9B5DE5', ch:'rgba(155,93,229,.3)' },
    { key:'gratitude',  label:'감사',  emoji:'🥹', color:'#F4A261', ch:'rgba(244,162,97,.3)' },
    { key:'tired',      label:'피곤',  emoji:'😴', color:'#8D99AE', ch:'rgba(141,153,174,.3)' },
  ]
  const em = {}; emotions.forEach(e => em[e.key]=e)

  const sampleData = [
    {lat:37.57,lng:126.98,emotion:'tired',city:'서울',count:4823,isSample:true},
    {lat:35.68,lng:139.65,emotion:'tired',city:'도쿄',count:6234,isSample:true},
    {lat:31.23,lng:121.47,emotion:'excitement',city:'상하이',count:5678,isSample:true},
    {lat:28.61,lng:77.21,emotion:'excitement',city:'뉴델리',count:5432,isSample:true},
    {lat:48.86,lng:2.35,emotion:'gratitude',city:'파리',count:3876,isSample:true},
    {lat:51.51,lng:-0.13,emotion:'tired',city:'런던',count:4234,isSample:true},
    {lat:40.71,lng:-74.01,emotion:'anxiety',city:'뉴욕',count:7654,isSample:true},
    {lat:34.05,lng:-118.24,emotion:'excitement',city:'LA',count:5678,isSample:true},
    {lat:-23.55,lng:-46.63,emotion:'joy',city:'상파울루',count:4567,isSample:true},
    {lat:30.04,lng:31.24,emotion:'gratitude',city:'카이로',count:2876,isSample:true},
    {lat:6.52,lng:3.38,emotion:'joy',city:'라고스',count:3456,isSample:true},
    {lat:-33.87,lng:151.21,emotion:'joy',city:'시드니',count:2876,isSample:true},
    {lat:55.76,lng:37.62,emotion:'anger',city:'모스크바',count:1987,isSample:true},
    {lat:19.08,lng:72.88,emotion:'anxiety',city:'뭄바이',count:4567,isSample:true},
    {lat:25.20,lng:55.27,emotion:'excitement',city:'두바이',count:2134,isSample:true},
    {lat:1.35,lng:103.82,emotion:'peace',city:'싱가포르',count:1876,isSample:true},
    {lat:41.90,lng:12.50,emotion:'joy',city:'로마',count:2876,isSample:true},
    {lat:52.52,lng:13.41,emotion:'peace',city:'베를린',count:2187,isSample:true},
    {lat:19.43,lng:-99.13,emotion:'joy',city:'멕시코시티',count:3210,isSample:true},
    {lat:-6.21,lng:106.85,emotion:'joy',city:'자카르타',count:3456,isSample:true},
    {lat:33.69,lng:35.50,emotion:'anxiety',city:'베이루트',count:987,isSample:true},
    {lat:15.55,lng:32.53,emotion:'anxiety',city:'하르툼',count:654,isSample:true},
    {lat:34.53,lng:69.17,emotion:'anxiety',city:'카불',count:543,isSample:true},
    {lat:33.34,lng:44.40,emotion:'sad',city:'바그다드',count:876,isSample:true},
    {lat:15.35,lng:44.21,emotion:'sad',city:'사나',count:432,isSample:true},
  ]

  let realData = []
  try {
    const { data } = await db.from('emotion_posts').select('*').gte('created_at',todayKey+'T00:00:00Z').limit(1000)
    realData = data||[]
  } catch(e) {}

  let allData = [...sampleData, ...realData]
  document.getElementById('totalNum').textContent = (sampleData.reduce((a,d)=>a+d.count,0)+realData.length).toLocaleString()

  // 감정 버튼
  const emEl = document.getElementById('emotions')
  let selected = null
  emotions.forEach(e => {
    const btn = document.createElement('button')
    btn.className='em-btn'; btn.dataset.key=e.key
    btn.style.setProperty('--c',e.color); btn.style.setProperty('--ch',e.ch)
    btn.innerHTML=`<span class="emo">${e.emoji}</span><span class="lbl">${e.label}</span>`
    btn.onclick = async () => {
      const posted = await hasPostedToday()
      if(posted){ showToast('😊','오늘은 이미 기록했어요','내일 또 만나요'); return }
      selected = selected===e.key ? null : e.key
      document.querySelectorAll('.em-btn').forEach(b=>b.classList.toggle('active',b.dataset.key===selected))
      const h=document.getElementById('hint')
      if(selected){ const ex=em[selected]; h.textContent=`${ex.emoji} 선택됨 · 지구를 클릭하거나 📍로 내 위치 기록`; h.classList.add('hl') }
      else{ h.textContent='감정을 선택하고 지구를 클릭해 기록해요'; h.classList.remove('hl') }
    }
    emEl.appendChild(btn)
  })

  // GPS 버튼
  const gpsBtn = document.createElement('button')
  gpsBtn.className='em-btn'
  gpsBtn.innerHTML=`<span class="emo">📍</span><span class="lbl">내위치</span>`
  gpsBtn.onclick = () => {
    showToast('📍','위치 확인 중...','')
    navigator.geolocation.getCurrentPosition(
      async pos => {
        const { latitude:lat, longitude:lng } = pos.coords
        globe.pointOfView({ lat, lng, altitude:1.6 }, 1500)
        if (selected) {
          const posted = await hasPostedToday()
          if (!posted) recordEmotion(lat, lng)
          else showToast('🌍','내 위치로 이동했어요','')
        } else {
          showToast('🌍','내 위치로 이동했어요','')
        }
      },
      () => showToast('😅','위치 접근 실패','지구를 직접 클릭해주세요')
    )
  }
  emEl.appendChild(gpsBtn)

  function showToast(emoji, title, sub, dur=2400) {
    document.getElementById('tEmoji').textContent=emoji
    document.getElementById('tTitle').textContent=title
    document.getElementById('tSub').textContent=sub
    const t=document.getElementById('toast'); t.classList.add('show')
    setTimeout(()=>t.classList.remove('show'), dur)
  }

  async function recordEmotion(lat, lng) {
    const e = em[selected]
    const userId = currentUser ? currentUser.id : (localStorage.getItem('eg_uid')||(() => { const id='u_'+Date.now().toString(36)+Math.random().toString(36).substr(2,5); localStorage.setItem('eg_uid',id); return id })())
    try {
      const { error } = await db.from('emotion_posts').insert([{ user_id:userId, lat, lng, emotion:selected }])
      if(error) throw error
      if(!currentUser) localStorage.setItem('eg_posted', todayKey)
      realData = [...realData, {lat, lng, emotion:selected, isUser:true}]
      allData = [...sampleData, ...realData]
      globe.pointsData(allData)
      globe.pointOfView({ lat, lng, altitude:1.8 }, 1200)
      setTimeout(()=>{ globe.controls().autoRotate=true }, 3500)
      const n=document.getElementById('totalNum')
      n.textContent=(parseInt(n.textContent.replace(/,/g,''))+1).toLocaleString()
      showToast(e.emoji,`${e.label} 기록 완료`,'내일 또 만나요 🌍')
      document.querySelectorAll('.em-btn').forEach(b => {
        if(b.dataset.key===selected){ b.querySelector('.lbl').textContent='오늘 ✓'; b.style.borderColor=em[selected].color }
        else if(b.dataset.key) b.style.opacity='0.2'
        b.classList.remove('active')
      })
      selected=null
      document.getElementById('hint').textContent='오늘의 감정이 지구에 새겨졌어요'
    } catch(err) { showToast('😅','저장 실패','다시 시도해주세요') }
  }

  // Warmth
  let warmthArcs=[], warmthRings=[], warmthTarget=null

  function sendWarmthAnimation(fromLat, fromLng, toLat, toLng) {
    const id=Date.now()
    warmthArcs=[...warmthArcs, {id, startLat:fromLat, startLng:fromLng, endLat:toLat, endLng:toLng}]
    globe.arcsData(warmthArcs)
    setTimeout(()=>{
      warmthArcs=warmthArcs.filter(a=>a.id!==id); globe.arcsData(warmthArcs)
      const rid=Date.now()
      warmthRings=[...warmthRings, {id:rid, lat:toLat, lng:toLng}]; globe.ringsData(warmthRings)
      setTimeout(()=>{ warmthRings=warmthRings.filter(r=>r.id!==rid); globe.ringsData(warmthRings) }, 4000)
    }, 5500)
  }

  function showWarmthPanel(point) {
    warmthTarget=point
    const e=em[point.emotion]
    document.getElementById('wp-emoji').textContent=e?.emoji||'✨'
    document.getElementById('wp-loc').textContent=point.city||'이 지역'
    document.getElementById('warmth-panel').classList.add('show')
  }

  function startWarmthJourney(fromLat, fromLng, target) {
    // 두 지점이 모두 보이도록 지구 회전
    const midLat = (fromLat + target.lat) / 2
    const midLng = (fromLng + target.lng) / 2
    const dist = Math.sqrt(Math.pow(fromLat-target.lat,2)+Math.pow(fromLng-target.lng,2))
    const alt = Math.min(Math.max(dist/50, 1.4), 2.8)
    globe.pointOfView({ lat:midLat, lng:midLng, altitude:alt }, 1500)
    setTimeout(() => {
      sendWarmthAnimation(fromLat, fromLng, target.lat, target.lng)
      showToast('💛','따뜻한 빛을 보냈어요','조용히, 천천히 🌍')
    }, 1600)
  }

  document.getElementById('wp-send').onclick = () => {
    if(!warmthTarget) return
    const target = warmthTarget
    document.getElementById('warmth-panel').classList.remove('show')
    warmthTarget = null
    showToast('📍','위치 확인 중...','')
    // GPS로 내 실제 위치 가져오기
    navigator.geolocation.getCurrentPosition(
      pos => startWarmthJourney(pos.coords.latitude, pos.coords.longitude, target),
      () => {
        // GPS 실패 시 현재 POV 사용
        const pov = globe.pointOfView()
        startWarmthJourney(pov.lat, pov.lng, target)
      },
      { timeout: 3000 }
    )
  }
  document.getElementById('wp-close').onclick = () => {
    document.getElementById('warmth-panel').classList.remove('show'); warmthTarget=null
  }

  // ─────────────────────────────────────────
  // GLOBE
  // ─────────────────────────────────────────
  const globe = Globe()(document.getElementById('globeViz'))
    .globeImageUrl('https://utcufydzowykkuklrstw.supabase.co/storage/v1/object/public/textures/default/day.jpg')
    .backgroundImageUrl('https://utcufydzowykkuklrstw.supabase.co/storage/v1/object/public/textures/default/space.png')
    .atmosphereColor('#4a8fcc')
    .atmosphereAltitude(0.18)
    .pointsData(allData)
    .pointLat('lat').pointLng('lng')
    .pointColor(d => { const e=em[d.emotion]; if(!e) return 'rgba(255,255,255,0.3)'; if(d.isUser) return e.color; if(d.isSample) return e.color+'44'; return e.color+'aa' })
    .pointRadius(d => { if(d.isUser) return 0.55; if(d.isSample) return Math.min(Math.sqrt((d.count||1)/100)*0.38,1.4); return 0.5 })
    .pointAltitude(d => d.isUser ? 0.025 : 0.008)
    .pointResolution(12)
    .pointLabel(d => { const e=em[d.emotion]; const loc=d.isUser?'나의 감정 ✨':d.city||'익명의 감정'; return `<div style="background:rgba(3,5,15,.95);border:1px solid rgba(255,255,255,.07);padding:10px 14px;border-radius:12px;color:white;font-family:'Gowun Dodum',sans-serif;font-size:12px;line-height:1.6"><div style="font-size:18px;margin-bottom:4px">${e?.emoji||'✨'}</div><div style="font-weight:bold;opacity:0.8">${loc}</div><div style="color:${e?.color};font-size:10px;opacity:0.7">${e?.label||''}</div></div>` })
    .ringsData(sampleData.filter(d=>['sad','anxiety','anger'].includes(d.emotion)&&d.count>1000))
    .ringLat('lat').ringLng('lng')
    .ringColor(d => { const e=em[d.emotion]; return t=>`rgba(${hexToRgb(e?.color||'#fff')},${(1-t)*0.12})` })
    .ringMaxRadius(2.5).ringPropagationSpeed(0.4).ringRepeatPeriod(4000)
    .arcsData([])
    .arcStartLat('startLat').arcStartLng('startLng').arcEndLat('endLat').arcEndLng('endLng')
    .arcColor(()=>'rgba(255,215,80,0.95)')
    .arcStroke(0.9)
    .arcDashLength(0.025)
    .arcDashGap(500)
    .arcDashAnimateTime(4500)
    .arcAltitude(0.35)
    .onPointClick(point => showWarmthPanel(point))
    .onGlobeClick(async ({lat,lng}) => {
      if(!selected) {
        const h=document.getElementById('hint'); h.textContent='감정을 먼저 선택해주세요'; h.classList.add('hl')
        setTimeout(()=>{ h.textContent='감정을 선택하고 지구를 클릭해 기록해요'; h.classList.remove('hl') },2000)
        return
      }
      const posted=await hasPostedToday()
      if(posted){ showToast('😊','오늘은 이미 기록했어요','내일 또 만나요'); return }
      recordEmotion(lat, lng)
    })
    .width(window.innerWidth).height(window.innerHeight)

  globe.controls().autoRotate=true; globe.controls().autoRotateSpeed=0.3
  globe.controls().enableDamping=true; globe.controls().dampingFactor=0.06

  let rt
  globe.controls().addEventListener('start',()=>{ globe.controls().autoRotate=false; clearTimeout(rt) })
  globe.controls().addEventListener('end',()=>{ rt=setTimeout(()=>globe.controls().autoRotate=true,5000) })
  window.addEventListener('resize',()=>globe.width(window.innerWidth).height(window.innerHeight))

  // 실시간
  db.channel('emotion_rt')
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'emotion_posts'},payload=>{
      const p=payload.new, myId=currentUser?currentUser.id:localStorage.getItem('eg_uid')
      if(p.user_id!==myId){ realData=[...realData,p]; allData=[...sampleData,...realData]; globe.pointsData(allData); const n=document.getElementById('totalNum'); n.textContent=(parseInt(n.textContent.replace(/,/g,''))+1).toLocaleString() }
    }).subscribe()

  // 지구 먼저 보여주기
  setTimeout(()=>document.getElementById('loading').classList.add('hide'), 700)

  // 스킨 UI만 초기화 (셰이더 없이)
  const savedSkin = localStorage.getItem('eg_skin') || 'default'
  buildSkinUI(savedSkin)

  // 텍스처 로드 (셰이더 없이 기본 방식)
  const storageDayUrl = `${STORAGE}/default/day.jpg`
  fetch(storageDayUrl, {method:'HEAD'}).then(r => {
    if (r.ok) globe.globeImageUrl(storageDayUrl)
  }).catch(() => {})
}

// ─────────────────────────────────────────
// SKIN 시스템
// ─────────────────────────────────────────
let _globeMat = null  // 현재 ShaderMaterial 참조

// loadTextureWithFallback: 셰이더 구현 시 복구





// ─────────────────────────────────────────
// applySkin — 스킨 교체 함수
// ─────────────────────────────────────────
function applySkin(skinKey, globe) {
  const skin = SKINS[skinKey]
  if (!skin) return
  if (skin.locked) { showSkinToast('🔒', '곧 출시돼요'); return }

  const fb = skin.fallback || SKINS.default.fallback
  const loadingEl = document.getElementById('skin-loading')
  loadingEl.style.opacity = '1'

  Promise.all([
    loadTextureWithFallback(skin.day, fb?.day),
    loadTextureWithFallback(skin.night, fb?.night)
  ]).then(([dayTex, nightTex]) => {
    if (_globeMat) {
      if (dayTex)   _globeMat.uniforms.dayTexture.value   = dayTex
      if (nightTex) _globeMat.uniforms.nightTexture.value = nightTex
    }
    loadTextureWithFallback(skin.bg, fb?.bg).then(bg => {
      if (bg) window._globe?.backgroundImageUrl(skin.bg)
    })
    localStorage.setItem('eg_skin', skinKey)
    loadingEl.style.opacity = '0'
    updateSkinUI(skinKey)
  }).catch(() => {
    showSkinToast('😅', '테마 로드 실패')
    loadingEl.style.opacity = '0'
  })
}

function showSkinToast(emoji, msg) {
  document.getElementById('tEmoji').textContent = emoji
  document.getElementById('tTitle').textContent = msg
  document.getElementById('tSub').textContent = ''
  const t = document.getElementById('toast'); t.classList.add('show')
  setTimeout(() => t.classList.remove('show'), 2000)
}

// ─────────────────────────────────────────
// 스킨 UI
// ─────────────────────────────────────────
function buildSkinUI(activeSkin) {
  const list = document.getElementById('skin-list')
  Object.entries(SKINS).forEach(([key, skin]) => {
    const item = document.createElement('div')
    item.className = 'skin-item' + (skin.locked ? ' locked' : '') + (key === activeSkin ? ' active' : '')
    item.dataset.skin = key
    item.innerHTML = `<span class="si-emoji">${skin.emoji}</span><span class="si-label">${skin.label}</span>${skin.locked ? '<span class="si-lock">곧 출시</span>' : ''}`
    if (!skin.locked) item.onclick = () => applySkin(key, window._globe)
    list.appendChild(item)
  })

  // 토글
  const toggle = document.getElementById('skin-toggle')
  const panel  = document.getElementById('skin-panel')
  toggle.onclick = (e) => { e.stopPropagation(); panel.classList.toggle('show') }
  document.addEventListener('click', () => panel.classList.remove('show'))
  panel.addEventListener('click', e => e.stopPropagation())
}

function updateSkinUI(activeKey) {
  document.querySelectorAll('.skin-item').forEach(el => {
    el.classList.toggle('active', el.dataset.skin === activeKey)
  })
}

// ─────────────────────────────────────────
// 유틸
// ─────────────────────────────────────────
function hexToRgb(hex) {
  const r=/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex)
  return r ? `${parseInt(r[1],16)},${parseInt(r[2],16)},${parseInt(r[3],16)}` : '255,255,255'
}
