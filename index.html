<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>감정지구본</title>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Cormorant+Garamond:ital,wght@1,400;1,600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/globe.gl@2/dist/globe.gl.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #03050f; font-family: 'Gowun Dodum', sans-serif; color: white; }
#globeViz { width: 100vw; height: 100vh; }

#title { position: fixed; top: 24px; left: 50%; transform: translateX(-50%); text-align: center; z-index: 20; pointer-events: none; }
#title h1 { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 30px; font-weight: 600; letter-spacing: 3px; margin: 0; background: linear-gradient(135deg, #fff 0%, #a8d8ff 60%, #c8b4ff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
#title p { font-size: 10px; letter-spacing: 4px; text-transform: uppercase; opacity: 0.35; margin: 5px 0 0; }

#stats { position: fixed; top: 28px; right: 28px; text-align: right; z-index: 20; pointer-events: none; }
#stats .num { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 36px; line-height: 1; background: linear-gradient(135deg, #fff, #a8d8ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
#stats .lbl { font-size: 9px; letter-spacing: 2.5px; text-transform: uppercase; opacity: 0.35; margin-top: 2px; }

#user-status { position: fixed; top: 28px; left: 28px; z-index: 20; }
#login-btn { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 20px; padding: 8px 16px; color: white; font-family: 'Gowun Dodum', sans-serif; font-size: 11px; cursor: pointer; letter-spacing: 1px; transition: all 0.2s; }
#login-btn:hover { background: rgba(255,255,255,0.12); }
#user-info { display: none; align-items: center; gap: 8px; }
#user-avatar { width: 28px; height: 28px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.2); }
#user-name { font-size: 11px; opacity: 0.6; letter-spacing: 0.5px; }
#logout-btn { font-size: 10px; opacity: 0.3; cursor: pointer; background: none; border: none; color: white; padding: 0; letter-spacing: 1px; }
#logout-btn:hover { opacity: 0.6; }

#emotions { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; z-index: 20; background: rgba(255,255,255,0.04); backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.08); border-radius: 60px; padding: 10px 16px; }
.em-btn { display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; padding: 8px 11px; border-radius: 40px; border: 1.5px solid transparent; background: transparent; transition: all 0.2s ease; color: white; }
.em-btn:hover { background: rgba(255,255,255,0.07); transform: translateY(-2px); }
.em-btn.active { border-color: var(--c); background: rgba(255,255,255,0.07); box-shadow: 0 0 22px var(--ch); transform: translateY(-3px); }
.em-btn .emo { font-size: 22px; line-height: 1; }
.em-btn .lbl { font-size: 9px; letter-spacing: 0.5px; opacity: 0.55; }
.em-btn.active .lbl { opacity: 1; }

#hint { position: fixed; bottom: 110px; left: 50%; transform: translateX(-50%); font-size: 11px; letter-spacing: 1.5px; opacity: 0.3; text-align: center; z-index: 20; pointer-events: none; transition: all 0.4s; white-space: nowrap; }
#hint.hl { opacity: 0.8; color: #FFD166; }

#toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.85); background: rgba(8,12,28,0.96); border: 1px solid rgba(255,255,255,0.1); border-radius: 22px; padding: 28px 36px; text-align: center; z-index: 100; opacity: 0; pointer-events: none; transition: all 0.3s cubic-bezier(.34,1.56,.64,1); min-width: 200px; }
#toast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); pointer-events: auto; }
#toast .big { font-size: 52px; display: block; margin-bottom: 12px; }
#toast h3 { margin: 0 0 6px; font-size: 18px; font-weight: normal; }
#toast p { margin: 0; font-size: 11px; opacity: 0.4; letter-spacing: 1.5px; }

#loading { position: fixed; inset: 0; background: #03050f; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200; transition: opacity 0.8s; }
#loading.hide { opacity: 0; pointer-events: none; }
#loading .spinner { width: 40px; height: 40px; border: 2px solid rgba(255,255,255,0.1); border-top-color: #a8d8ff; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 16px; }
#loading p { font-size: 12px; letter-spacing: 3px; opacity: 0.4; }
@keyframes spin { to { transform: rotate(360deg); } }

#warmth-panel {
  position: fixed; bottom: 140px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: rgba(8,12,28,0.96); border: 1px solid rgba(255,200,80,0.2);
  border-radius: 20px; padding: 20px 28px; text-align: center; z-index: 50;
  opacity: 0; pointer-events: none; transition: all 0.3s cubic-bezier(.34,1.56,.64,1);
  min-width: 220px;
}
#warmth-panel.show { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; }
#warmth-panel .wp-emoji { font-size: 32px; margin-bottom: 6px; }
#warmth-panel .wp-loc { font-size: 13px; font-weight: bold; margin-bottom: 4px; }
#warmth-panel .wp-txt { font-size: 10px; opacity: 0.4; letter-spacing: 1px; margin-bottom: 14px; }
#wp-send { background: rgba(255,200,80,0.15); border: 1px solid rgba(255,200,80,0.4); border-radius: 20px; padding: 9px 20px; color: #FFD166; font-family: 'Gowun Dodum', sans-serif; font-size: 12px; cursor: pointer; transition: all 0.2s; letter-spacing: 0.5px; }
#wp-send:hover { background: rgba(255,200,80,0.25); transform: scale(1.03); }
#wp-close { display: block; margin: 10px auto 0; background: none; border: none; color: white; opacity: 0.25; font-size: 11px; cursor: pointer; letter-spacing: 1px; }
#wp-close:hover { opacity: 0.5; }
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div><p>지구를 불러오는 중...</p></div>
<div id="globeViz"></div>

<div id="title"><h1>감정지구본</h1><p>Emotion Globe &middot; Live</p></div>
<div id="stats"><div class="num" id="totalNum">-</div><div class="lbl">오늘의 감정</div></div>

<div id="user-status">
  <button id="login-btn">🔑 구글로 로그인</button>
  <div id="user-info">
    <img id="user-avatar" src="" alt="">
    <span id="user-name"></span>
    <button id="logout-btn">로그아웃</button>
  </div>
</div>

<div id="warmth-panel">
  <div class="wp-emoji" id="wp-emoji">😢</div>
  <div class="wp-loc" id="wp-loc">이 지역</div>
  <div class="wp-txt">이곳에 따뜻한 빛을 보낼까요?</div>
  <button id="wp-send">💛 위로 보내기</button>
  <button id="wp-close">취소</button>
</div>

<div id="hint">감정을 선택하고 지구를 클릭해 기록해요 &middot; 드래그로 회전 &middot; 스크롤로 확대</div>
<div id="emotions"></div>
<div id="toast"><span class="big" id="tEmoji">😊</span><h3 id="tTitle">감정이 기록됐어요</h3><p id="tSub">내일 또 만나요 🌍</p></div>

<script>
window.onload = async function() {
  const SUPABASE_URL = 'https://utcufydzowykkuklrstw.supabase.co'
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV0Y3VmeWR6b3d5a2t1a2xyc3R3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4ODAzNDUsImV4cCI6MjA5NTQ1NjM0NX0.XwiahS2BMQuThIWGntJeqRErqRGVhXH0Z-8WL39p0Ys'
  const { createClient } = supabase
  const db = createClient(SUPABASE_URL, SUPABASE_KEY)

  // 로그인 상태
  let currentUser = null
  const todayKey = new Date().toISOString().split('T')[0]

  // 유저 UI 업데이트
  function updateUserUI(user) {
    currentUser = user
    const loginBtn = document.getElementById('login-btn')
    const userInfo = document.getElementById('user-info')
    if (user) {
      loginBtn.style.display = 'none'
      userInfo.style.display = 'flex'
      document.getElementById('user-avatar').src = user.user_metadata?.avatar_url || ''
      document.getElementById('user-name').textContent = user.user_metadata?.full_name?.split(' ')[0] || '익명'
    } else {
      loginBtn.style.display = 'block'
      userInfo.style.display = 'none'
    }
  }

  // 로그인 버튼
  document.getElementById('login-btn').onclick = async () => {
    await db.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: window.location.href }
    })
  }
  document.getElementById('logout-btn').onclick = async () => {
    await db.auth.signOut()
    updateUserUI(null)
    showToast('👋', '로그아웃 됐어요', '')
  }

  // 세션 확인
  const { data: { session } } = await db.auth.getSession()
  if (session) updateUserUI(session.user)
  db.auth.onAuthStateChange((event, session) => {
    updateUserUI(session?.user || null)
  })

  // 오늘 기록 여부 확인
  async function hasPostedToday() {
    if (!currentUser) return localStorage.getItem('eg_posted') === todayKey
    const { data } = await db.from('emotion_posts')
      .select('id').eq('user_id', currentUser.id)
      .gte('created_at', todayKey + 'T00:00:00Z').limit(1)
    return data && data.length > 0
  }

  const emotions = [
    { key:'joy',        label:'기쁨',  emoji:'😊', color:'#FFD166', ch:'rgba(255,209,102,.35)' },
    { key:'peace',      label:'평온',  emoji:'😌', color:'#06D6A0', ch:'rgba(6,214,160,.35)' },
    { key:'sad',        label:'슬픔',  emoji:'😢', color:'#5B8CDB', ch:'rgba(91,140,219,.35)' },
    { key:'anger',      label:'분노',  emoji:'😤', color:'#EF476F', ch:'rgba(239,71,111,.35)' },
    { key:'excitement', label:'설렘',  emoji:'🤩', color:'#FF70A6', ch:'rgba(255,112,166,.35)' },
    { key:'anxiety',    label:'불안',  emoji:'😰', color:'#9B5DE5', ch:'rgba(155,93,229,.35)' },
    { key:'gratitude',  label:'감사',  emoji:'🥹', color:'#F4A261', ch:'rgba(244,162,97,.35)' },
    { key:'tired',      label:'피곤',  emoji:'😴', color:'#8D99AE', ch:'rgba(141,153,174,.35)' },
  ]
  const em = {}
  emotions.forEach(e => em[e.key] = e)

  const sampleData = [
    {lat:37.57,lng:126.98,emotion:'tired',city:'서울',count:4823,isSample:true},
    {lat:35.68,lng:139.65,emotion:'tired',city:'도쿄',count:6234,isSample:true},
    {lat:31.23,lng:121.47,emotion:'excitement',city:'상하이',count:5678,isSample:true},
    {lat:28.61,lng:77.21,emotion:'excitement',city:'뉴델리',count:5432,isSample:true},
    {lat:48.86,lng:2.35,emotion:'gratitude',city:'파리',count:3876,isSample:true},
    {lat:51.51,lng:-0.13,emotion:'tired',city:'런던',count:4234,isSample:true},
    {lat:40.71,lng:-74.01,emotion:'anxiety',city:'뉴욕',count:7654,isSample:true},
    {lat:34.05,lng:-118.24,emotion:'excitement',city:'LA',count:5678,isSample:true},
    {lat:-23.55,lng:-46.63,emotion:'joy',city:'상파울루',count:4567,isSample:true},
    {lat:30.04,lng:31.24,emotion:'gratitude',city:'카이로',count:2876,isSample:true},
    {lat:6.52,lng:3.38,emotion:'joy',city:'라고스',count:3456,isSample:true},
    {lat:-33.87,lng:151.21,emotion:'joy',city:'시드니',count:2876,isSample:true},
    {lat:55.76,lng:37.62,emotion:'anger',city:'모스크바',count:1987,isSample:true},
    {lat:19.08,lng:72.88,emotion:'anxiety',city:'뭄바이',count:4567,isSample:true},
    {lat:25.20,lng:55.27,emotion:'excitement',city:'두바이',count:2134,isSample:true},
    {lat:1.35,lng:103.82,emotion:'peace',city:'싱가포르',count:1876,isSample:true},
    {lat:41.90,lng:12.50,emotion:'joy',city:'로마',count:2876,isSample:true},
    {lat:52.52,lng:13.41,emotion:'peace',city:'베를린',count:2187,isSample:true},
    {lat:19.43,lng:-99.13,emotion:'joy',city:'멕시코시티',count:3210,isSample:true},
    {lat:-6.21,lng:106.85,emotion:'joy',city:'자카르타',count:3456,isSample:true},
  ]

  let realData = []
  try {
    const { data } = await db.from('emotion_posts').select('*')
      .gte('created_at', todayKey + 'T00:00:00Z').limit(1000)
    realData = data || []
  } catch(e) { console.log('DB 로드 실패', e) }

  let allData = [...sampleData, ...realData]
  const sampleTotal = sampleData.reduce((a,d)=>a+d.count,0)
  document.getElementById('totalNum').textContent = (sampleTotal + realData.length).toLocaleString()

  // 감정 버튼
  const emEl = document.getElementById('emotions')
  let selected = null
  emotions.forEach(e => {
    const btn = document.createElement('button')
    btn.className='em-btn'; btn.dataset.key=e.key
    btn.style.setProperty('--c', e.color); btn.style.setProperty('--ch', e.ch)
    btn.innerHTML=`<span class="emo">${e.emoji}</span><span class="lbl">${e.label}</span>`
    btn.onclick = async () => {
      const posted = await hasPostedToday()
      if(posted){ showToast('😊','오늘은 이미 기록했어요','내일 또 와주세요 🌍'); return }
      selected = selected===e.key ? null : e.key
      document.querySelectorAll('.em-btn').forEach(b=>b.classList.toggle('active',b.dataset.key===selected))
      const h=document.getElementById('hint')
      if(selected){
        const ex=em[selected]
        h.textContent=`${ex.emoji} ${ex.label} 선택됨 · 지구를 클릭하거나 📍 버튼으로 내 위치 자동감지`
        h.classList.add('hl')
      } else {
        h.textContent='감정을 선택하고 지구를 클릭해 기록해요 · 드래그로 회전 · 스크롤로 확대'
        h.classList.remove('hl')
      }
    }
    emEl.appendChild(btn)
  })

  // GPS 버튼
  const gpsBtn = document.createElement('button')
  gpsBtn.className='em-btn'
  gpsBtn.style.borderColor='rgba(255,255,255,0.2)'
  gpsBtn.innerHTML=`<span class="emo">📍</span><span class="lbl">내위치</span>`
  gpsBtn.onclick = async () => {
    if(!selected){ showToast('👆','감정을 먼저 선택해주세요',''); return }
    const posted = await hasPostedToday()
    if(posted){ showToast('😊','오늘은 이미 기록했어요','내일 또 와주세요 🌍'); return }
    showToast('📍','위치 확인 중...','잠깐만요')
    navigator.geolocation.getCurrentPosition(
      pos => recordEmotion(pos.coords.latitude, pos.coords.longitude),
      () => showToast('😅','위치 접근 실패','지구를 직접 클릭해주세요')
    )
  }
  emEl.appendChild(gpsBtn)

  function showToast(emoji, title, sub, dur=2800){
    document.getElementById('tEmoji').textContent=emoji
    document.getElementById('tTitle').textContent=title
    document.getElementById('tSub').textContent=sub
    const t=document.getElementById('toast'); t.classList.add('show')
    setTimeout(()=>t.classList.remove('show'), dur)
  }

  async function recordEmotion(lat, lng) {
    const e = em[selected]
    const userId = currentUser ? currentUser.id : (localStorage.getItem('eg_uid') || (() => { const id='u_'+Date.now().toString(36)+Math.random().toString(36).substr(2,5); localStorage.setItem('eg_uid',id); return id })())
    showToast('⏳','기록 중...','')
    try {
      const { error } = await db.from('emotion_posts').insert([{ user_id: userId, lat, lng, emotion: selected }])
      if(error) throw error
      if(!currentUser) localStorage.setItem('eg_posted', todayKey)
      realData = [...realData, {lat, lng, emotion: selected, isUser: true}]
      allData = [...sampleData, ...realData]
      globe.pointsData(allData)
      globe.pointOfView({ lat, lng, altitude: 1.8 }, 1200)
      setTimeout(() => { globe.controls().autoRotate = true }, 3500)
      const n=document.getElementById('totalNum')
      n.textContent=(parseInt(n.textContent.replace(/,/g,''))+1).toLocaleString()
      showToast(e.emoji,`${e.label} 기록 완료!`,'내일 또 만나요 🌍')
      // 오늘 기록한 감정 버튼 표시
      document.querySelectorAll('.em-btn').forEach(b => {
        if(b.dataset.key === selected) {
          b.querySelector('.lbl').textContent = '오늘 ✓'
          b.style.border = '1.5px solid ' + em[selected].color
        } else if(b.dataset.key) {
          b.style.opacity = '0.4'
        }
        b.classList.remove('active')
      })
      selected=null
      const h=document.getElementById('hint')
      h.textContent='오늘의 감정이 지구에 새겨졌어요 ✨'; h.style.opacity='0.7'
    } catch(err) {
      showToast('😅','저장 실패','다시 시도해주세요')
    }
  }

  // Warmth 시스템
  let warmthArcs = []
  let warmthRings = []
  let warmthTarget = null

  function sendWarmthAnimation(fromLat, fromLng, toLat, toLng) {
    const arcId = Date.now()
    const newArc = { id: arcId, startLat: fromLat, startLng: fromLng, endLat: toLat, endLng: toLng }
    warmthArcs = [...warmthArcs, newArc]
    globe.arcsData(warmthArcs)
    setTimeout(() => {
      warmthArcs = warmthArcs.filter(a => a.id !== arcId)
      globe.arcsData(warmthArcs)
      const ringId = Date.now()
      const newRing = { id: ringId, lat: toLat, lng: toLng }
      warmthRings = [...warmthRings, newRing]
      globe.ringsData(warmthRings)
      setTimeout(() => {
        warmthRings = warmthRings.filter(r => r.id !== ringId)
        globe.ringsData(warmthRings)
      }, 3500)
    }, 5500)
  }

  function showWarmthPanel(point) {
    warmthTarget = point
    const e = em[point.emotion]
    document.getElementById('wp-emoji').textContent = e?.emoji || '✨'
    document.getElementById('wp-loc').textContent = point.city || '이 지역'
    document.getElementById('warmth-panel').classList.add('show')
  }

  document.getElementById('wp-send').onclick = () => {
    if (!warmthTarget) return
    const pov = globe.pointOfView()
    sendWarmthAnimation(pov.lat, pov.lng, warmthTarget.lat, warmthTarget.lng)
    document.getElementById('warmth-panel').classList.remove('show')
    showToast('💛', '따뜻한 빛을 보냈어요', '조용히, 천천히 🌍')
    warmthTarget = null
  }
  document.getElementById('wp-close').onclick = () => {
    document.getElementById('warmth-panel').classList.remove('show')
    warmthTarget = null
  }

  // 낮/밤 텍스처 (접속 시간 기준 자동)
  const hour = new Date().getUTCHours()
  const isDaytime = hour >= 6 && hour < 18
  const earthTex = isDaytime
    ? 'https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg'
    : 'https://unpkg.com/three-globe/example/img/earth-night.jpg'

  const globe = Globe()(document.getElementById('globeViz'))
    .globeImageUrl(earthTex)
    .backgroundImageUrl('https://unpkg.com/three-globe/example/img/night-sky.png')
    .atmosphereColor('#64b4ff')
    .atmosphereAltitude(0.14)
    .pointsData(allData)
    .pointLat('lat').pointLng('lng')
    .pointColor(d => {
      const e = em[d.emotion]
      if (!e) return '#fff'
      return d.isSample ? e.color + '55' : e.color
    })
    .pointRadius(d => {
      if (d.isUser) return 0.7
      if (d.isSample) return Math.min(Math.sqrt((d.count||1)/100)*0.45, 1.8)
      return 0.6
    })
    .pointAltitude(0.015)
    .pointResolution(8)
    .pointLabel(d => {
      const e=em[d.emotion]
      const label = d.isUser ? '나의 감정 ✨' : d.city ? d.city : '익명의 감정'
      return `<div style="background:rgba(5,8,22,.94);border:1px solid rgba(255,255,255,.1);padding:10px 14px;border-radius:14px;color:white;font-family:'Gowun Dodum',sans-serif;font-size:13px">
        <div style="font-size:20px;margin-bottom:5px">${e?.emoji||'✨'}</div>
        <div style="font-weight:bold;margin-bottom:2px">${label}</div>
        <div style="color:${e?.color||'#fff'};font-size:11px">${e?.label||d.emotion}</div>
      </div>`
    })
    .onGlobeClick(async ({lat,lng}) => {
      if(!selected){
        const h=document.getElementById('hint')
        h.textContent='👆 먼저 감정을 선택해주세요!'; h.classList.add('hl')
        setTimeout(()=>{ h.textContent='감정을 선택하고 지구를 클릭해 기록해요'; h.classList.remove('hl') },2500)
        return
      }
      const posted = await hasPostedToday()
      if(posted){ showToast('😊','오늘은 이미 기록했어요','내일 또 와주세요 🌍'); return }
      recordEmotion(lat, lng)
    })
    .arcsData([])
    .arcStartLat('startLat').arcStartLng('startLng')
    .arcEndLat('endLat').arcEndLng('endLng')
    .arcColor(() => ['rgba(255,220,100,0.05)', 'rgba(255,200,80,0.9)', 'rgba(255,220,130,0.05)'])
    .arcStroke(0.35)
    .arcDashLength(0.04)
    .arcDashGap(2)
    .arcDashAnimateTime(5000)
    .arcAltitude(0.25)
    .ringsData([])
    .ringLat('lat').ringLng('lng')
    .ringColor(() => t => `rgba(255,200,80,${(1-t)*0.8})`)
    .ringMaxRadius(3)
    .ringPropagationSpeed(1.2)
    .ringRepeatPeriod(900)
    .onPointClick((point) => {
      if (!point.isSample && !point.isUser) showWarmthPanel(point)
      else if (point.isSample || point.city) showWarmthPanel(point)
    })
    .width(window.innerWidth).height(window.innerHeight)

  globe.controls().autoRotate=true
  globe.controls().autoRotateSpeed=0.4
  globe.controls().enableDamping=true
  globe.controls().dampingFactor=0.08

  let rt
  globe.controls().addEventListener('start',()=>{ globe.controls().autoRotate=false; clearTimeout(rt) })
  globe.controls().addEventListener('end',()=>{ rt=setTimeout(()=>globe.controls().autoRotate=true,4000) })
  window.addEventListener('resize',()=>globe.width(window.innerWidth).height(window.innerHeight))

  // 실시간 구독
  db.channel('emotion_realtime')
    .on('postgres_changes', {event:'INSERT', schema:'public', table:'emotion_posts'}, payload => {
      const p = payload.new
      const myId = currentUser ? currentUser.id : localStorage.getItem('eg_uid')
      if(p.user_id !== myId) {
        realData = [...realData, p]
        allData = [...sampleData, ...realData]
        globe.pointsData(allData)
        const n=document.getElementById('totalNum')
        n.textContent=(parseInt(n.textContent.replace(/,/g,''))+1).toLocaleString()
      }
    })
    .subscribe()

  setTimeout(() => document.getElementById('loading').classList.add('hide'), 600)
}
</script>
</body>
</html>
