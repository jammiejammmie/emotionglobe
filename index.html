<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>감정지구본</title>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Cormorant+Garamond:ital,wght@1,400;1,600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #03050f; font-family: 'Gowun Dodum', sans-serif; color: white; }
#globeViz { width: 100vw; height: 100vh; }

#title {
  position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
  text-align: center; z-index: 20; pointer-events: none;
}
#title h1 {
  font-family: 'Cormorant Garamond', serif; font-style: italic;
  font-size: 30px; font-weight: 600; letter-spacing: 3px; margin: 0;
  background: linear-gradient(135deg, #fff 0%, #a8d8ff 60%, #c8b4ff 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
#title p { font-size: 10px; letter-spacing: 4px; text-transform: uppercase; opacity: 0.35; margin: 5px 0 0; }

#stats {
  position: fixed; top: 28px; right: 28px; text-align: right; z-index: 20; pointer-events: none;
}
#stats .num {
  font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 36px; line-height: 1;
  background: linear-gradient(135deg, #fff, #a8d8ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
#stats .lbl { font-size: 9px; letter-spacing: 2.5px; text-transform: uppercase; opacity: 0.35; margin-top: 2px; }

#emotions {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 6px; z-index: 20;
  background: rgba(255,255,255,0.04); backdrop-filter: blur(24px);
  border: 1px solid rgba(255,255,255,0.08); border-radius: 60px; padding: 10px 16px;
}
.em-btn {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  cursor: pointer; padding: 8px 11px; border-radius: 40px;
  border: 1.5px solid transparent; background: transparent;
  transition: all 0.2s ease; color: white;
}
.em-btn:hover { background: rgba(255,255,255,0.07); transform: translateY(-2px); }
.em-btn.active {
  border-color: var(--c); background: rgba(255,255,255,0.07);
  box-shadow: 0 0 22px var(--ch); transform: translateY(-3px);
}
.em-btn .emo { font-size: 22px; line-height: 1; }
.em-btn .lbl { font-size: 9px; letter-spacing: 0.5px; opacity: 0.55; }
.em-btn.active .lbl { opacity: 1; }

#hint {
  position: fixed; bottom: 110px; left: 50%; transform: translateX(-50%);
  font-size: 11px; letter-spacing: 1.5px; opacity: 0.3; text-align: center;
  z-index: 20; pointer-events: none; transition: all 0.4s; white-space: nowrap;
}
#hint.hl { opacity: 0.8; color: #FFD166; }

#toast {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -50%) scale(0.85);
  background: rgba(8,12,28,0.96); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 22px; padding: 28px 36px; text-align: center;
  z-index: 100; opacity: 0; pointer-events: none; transition: all 0.3s cubic-bezier(.34,1.56,.64,1);
}
#toast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
#toast .big { font-size: 52px; display: block; margin-bottom: 12px; }
#toast h3 { margin: 0 0 6px; font-size: 18px; font-weight: normal; }
#toast p { margin: 0; font-size: 11px; opacity: 0.4; letter-spacing: 1.5px; }

#legend {
  position: fixed; top: 28px; left: 28px; z-index: 20; pointer-events: none;
}
#legend .row { display: flex; align-items: center; gap: 7px; margin-bottom: 6px; }
#legend .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
#legend .txt { font-size: 10px; opacity: 0.45; letter-spacing: 0.5px; }
</style>
</head>
<body>

<div id="globeViz"></div>

<div id="title">
  <h1>감정지구본</h1>
  <p>Emotion Globe &middot; Live</p>
</div>

<div id="stats">
  <div class="num" id="totalNum">47,832</div>
  <div class="lbl">오늘의 감정</div>
</div>

<div id="legend"></div>
<div id="hint">감정을 선택하고 지구를 클릭해 기록해요 &middot; 드래그로 회전 &middot; 스크롤로 확대</div>
<div id="emotions"></div>

<div id="toast">
  <span class="big" id="tEmoji">😊</span>
  <h3 id="tTitle">감정이 기록됐어요</h3>
  <p id="tSub">내일 또 만나요 🌍</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/globe.gl@2/dist/globe.gl.min.js"></script>
<script>
window.onload = function() {
const emotions = [
  { key:'joy',        label:'기쁨',  emoji:'😊', color:'#FFD166', ch:'rgba(255,209,102,.35)' },
  { key:'peace',      label:'평온',  emoji:'😌', color:'#06D6A0', ch:'rgba(6,214,160,.35)' },
  { key:'sad',        label:'슬픔',  emoji:'😢', color:'#5B8CDB', ch:'rgba(91,140,219,.35)' },
  { key:'anger',      label:'분노',  emoji:'😤', color:'#EF476F', ch:'rgba(239,71,111,.35)' },
  { key:'excitement', label:'설렘',  emoji:'🤩', color:'#FF70A6', ch:'rgba(255,112,166,.35)' },
  { key:'anxiety',    label:'불안',  emoji:'😰', color:'#9B5DE5', ch:'rgba(155,93,229,.35)' },
  { key:'gratitude',  label:'감사',  emoji:'🥹', color:'#F4A261', ch:'rgba(244,162,97,.35)' },
  { key:'tired',      label:'피곤',  emoji:'😴', color:'#8D99AE', ch:'rgba(141,153,174,.35)' },
];
const em = {};
emotions.forEach(e => em[e.key] = e);

const raw = [
  {lat:37.57,lng:126.98,emotion:'tired',city:'서울',count:4823},
  {lat:35.18,lng:129.08,emotion:'joy',city:'부산',count:1234},
  {lat:35.68,lng:139.65,emotion:'tired',city:'도쿄',count:6234},
  {lat:34.69,lng:135.50,emotion:'joy',city:'오사카',count:3456},
  {lat:31.23,lng:121.47,emotion:'excitement',city:'상하이',count:5678},
  {lat:39.90,lng:116.41,emotion:'anxiety',city:'베이징',count:4321},
  {lat:1.35,lng:103.82,emotion:'peace',city:'싱가포르',count:1876},
  {lat:13.76,lng:100.50,emotion:'joy',city:'방콕',count:2345},
  {lat:-6.21,lng:106.85,emotion:'joy',city:'자카르타',count:3456},
  {lat:28.61,lng:77.21,emotion:'excitement',city:'뉴델리',count:5432},
  {lat:19.08,lng:72.88,emotion:'anxiety',city:'뭄바이',count:4567},
  {lat:25.20,lng:55.27,emotion:'excitement',city:'두바이',count:2134},
  {lat:24.71,lng:46.68,emotion:'gratitude',city:'리야드',count:1543},
  {lat:48.86,lng:2.35,emotion:'gratitude',city:'파리',count:3876},
  {lat:51.51,lng:-0.13,emotion:'tired',city:'런던',count:4234},
  {lat:52.52,lng:13.41,emotion:'peace',city:'베를린',count:2187},
  {lat:41.90,lng:12.50,emotion:'joy',city:'로마',count:2876},
  {lat:40.42,lng:-3.70,emotion:'excitement',city:'마드리드',count:2345},
  {lat:55.76,lng:37.62,emotion:'anger',city:'모스크바',count:1987},
  {lat:59.91,lng:10.75,emotion:'peace',city:'오슬로',count:876},
  {lat:40.71,lng:-74.01,emotion:'anxiety',city:'뉴욕',count:7654},
  {lat:34.05,lng:-118.24,emotion:'excitement',city:'로스앤젤레스',count:5678},
  {lat:41.88,lng:-87.63,emotion:'tired',city:'시카고',count:3456},
  {lat:37.77,lng:-122.42,emotion:'joy',city:'샌프란시스코',count:3234},
  {lat:43.65,lng:-79.38,emotion:'peace',city:'토론토',count:2345},
  {lat:19.43,lng:-99.13,emotion:'joy',city:'멕시코시티',count:3210},
  {lat:25.76,lng:-80.19,emotion:'excitement',city:'마이애미',count:2134},
  {lat:-23.55,lng:-46.63,emotion:'joy',city:'상파울루',count:4567},
  {lat:-34.60,lng:-58.38,emotion:'sad',city:'부에노스아이레스',count:2134},
  {lat:4.71,lng:-74.07,emotion:'excitement',city:'보고타',count:2145},
  {lat:30.04,lng:31.24,emotion:'gratitude',city:'카이로',count:2876},
  {lat:6.52,lng:3.38,emotion:'joy',city:'라고스',count:3456},
  {lat:-26.20,lng:28.05,emotion:'peace',city:'요하네스버그',count:1234},
  {lat:-1.29,lng:36.82,emotion:'joy',city:'나이로비',count:1654},
  {lat:-33.87,lng:151.21,emotion:'joy',city:'시드니',count:2876},
  {lat:-37.81,lng:144.96,emotion:'peace',city:'멜버른',count:2234},
  {lat:-36.85,lng:174.76,emotion:'joy',city:'오클랜드',count:1123},
];

// Build legend (top 4 emotions by count)
const emCounts = {};
raw.forEach(d => { emCounts[d.emotion] = (emCounts[d.emotion]||0) + d.count; });
const top4 = Object.entries(emCounts).sort((a,b)=>b[1]-a[1]).slice(0,4).map(e=>e[0]);
const legEl = document.getElementById('legend');
top4.forEach(key => {
  const e = em[key]; if(!e) return;
  const row = document.createElement('div'); row.className='row';
  row.innerHTML=`<div class="dot" style="background:${e.color}"></div><span class="txt">${e.emoji} ${e.label}</span>`;
  legEl.appendChild(row);
});

// Build emotion buttons
const emEl = document.getElementById('emotions');
let selected = null;
emotions.forEach(e => {
  const btn = document.createElement('button');
  btn.className='em-btn'; btn.dataset.key=e.key;
  btn.style.setProperty('--c', e.color);
  btn.style.setProperty('--ch', e.ch);
  btn.innerHTML=`<span class="emo">${e.emoji}</span><span class="lbl">${e.label}</span>`;
  btn.onclick = () => {
    if(localStorage.getItem('md')===new Date().toDateString()){
      toast('😊','오늘은 이미 기록했어요','내일 또 와주세요 🌍'); return;
    }
    selected = selected===e.key ? null : e.key;
    document.querySelectorAll('.em-btn').forEach(b=>b.classList.toggle('active',b.dataset.key===selected));
    const h=document.getElementById('hint');
    if(selected){ const ex=em[selected]; h.textContent=`${ex.emoji} ${ex.label}을(를) 선택했어요 · 지구를 클릭해 기록하세요`; h.classList.add('hl'); }
    else{ h.textContent='감정을 선택하고 지구를 클릭해 기록해요 · 드래그로 회전 · 스크롤로 확대'; h.classList.remove('hl'); }
  };
  emEl.appendChild(btn);
});

function toast(emoji, title, sub, dur=2800){
  document.getElementById('tEmoji').textContent=emoji;
  document.getElementById('tTitle').textContent=title;
  document.getElementById('tSub').textContent=sub;
  const t=document.getElementById('toast'); t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), dur);
}

// Globe
let allData = [...raw];
const total = raw.reduce((a,d)=>a+d.count,0);
document.getElementById('totalNum').textContent = total.toLocaleString();

const globe = Globe()(document.getElementById('globeViz'))
  .globeImageUrl('https://cdn.jsdelivr.net/npm/globe.gl/example/img/earth-blue-marble.jpg')
  .backgroundImageUrl('https://cdn.jsdelivr.net/npm/globe.gl/example/img/night-sky.png')
  .atmosphereColor('#64b4ff')
  .atmosphereAltitude(0.14)
  .pointsData(allData)
  .pointLat('lat').pointLng('lng')
  .pointColor(d => em[d.emotion]?.color || '#fff')
  .pointRadius(d => d.isUser ? 0.7 : Math.min(Math.sqrt((d.count||1)/100)*0.5, 2.0))
  .pointAltitude(0.015)
  .pointResolution(8)
  .pointLabel(d => {
    const e=em[d.emotion];
    return `<div style="background:rgba(5,8,22,.94);border:1px solid rgba(255,255,255,.1);padding:10px 14px;border-radius:14px;color:white;font-family:'Gowun Dodum',sans-serif;font-size:13px">
      <div style="font-size:20px;margin-bottom:5px">${e?.emoji||'✨'}</div>
      <div style="font-weight:bold;margin-bottom:2px">${d.city||'나의 위치'}</div>
      <div style="color:${e?.color||'#fff'};font-size:11px;margin-bottom:4px">${e?.label||d.emotion}</div>
      <div style="opacity:.35;font-size:10px">${d.count ? d.count.toLocaleString()+'명' : '나의 감정 ✨'}</div>
    </div>`;
  })
  .onGlobeClick(({lat,lng}) => {
    if(!selected){
      const h=document.getElementById('hint');
      h.textContent='👆 먼저 아래에서 감정을 선택해주세요!'; h.classList.add('hl');
      setTimeout(()=>{ h.textContent='감정을 선택하고 지구를 클릭해 기록해요 · 드래그로 회전 · 스크롤로 확대'; h.classList.remove('hl'); },2500);
      return;
    }
    const e=em[selected];
    allData=[...raw,{lat,lng,emotion:selected,city:'나의 위치',count:null,isUser:true}];
    globe.pointsData(allData);
    localStorage.setItem('md',new Date().toDateString());

    const n=document.getElementById('totalNum');
    n.textContent=(parseInt(n.textContent.replace(/,/g,''))+1).toLocaleString();

    toast(e.emoji,`${e.label} 기록 완료!`,'내일 또 만나요 🌍');

    selected=null;
    document.querySelectorAll('.em-btn').forEach(b=>b.classList.remove('active'));
    const h=document.getElementById('hint');
    h.textContent='오늘의 감정이 지구에 새겨졌어요 ✨'; h.style.opacity='0.7';
  })
  .width(window.innerWidth).height(window.innerHeight);

globe.controls().autoRotate=true;
globe.controls().autoRotateSpeed=0.4;
globe.controls().enableDamping=true;
globe.controls().dampingFactor=0.08;

let rt;
globe.controls().addEventListener('start',()=>{ globe.controls().autoRotate=false; clearTimeout(rt); });
globe.controls().addEventListener('end',()=>{ rt=setTimeout(()=>globe.controls().autoRotate=true,4000); });
window.addEventListener('resize',()=>globe.width(window.innerWidth).height(window.innerHeight));
}; // window.onload
</script>
</body>
</html>
