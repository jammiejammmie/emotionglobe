<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>감정지구본 Storage 설정</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #03050f; color: white; font-family: 'Segoe UI', sans-serif; padding: 24px 20px; min-height: 100vh; }
h1 { font-size: 18px; font-weight: 400; letter-spacing: 2px; opacity: 0.7; margin-bottom: 6px; }
.sub { font-size: 11px; opacity: 0.3; letter-spacing: 1px; margin-bottom: 32px; }
.card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 18px; margin-bottom: 14px; }
.card-title { font-size: 12px; letter-spacing: 1px; opacity: 0.5; margin-bottom: 12px; text-transform: uppercase; }
.item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
.item:last-child { border-bottom: none; }
.item-icon { font-size: 20px; width: 32px; text-align: center; flex-shrink: 0; }
.item-info { flex: 1; }
.item-name { font-size: 13px; margin-bottom: 2px; }
.item-desc { font-size: 10px; opacity: 0.35; letter-spacing: 0.5px; }
.item-status { font-size: 18px; flex-shrink: 0; }
.progress-bar { height: 3px; background: rgba(255,255,255,0.06); border-radius: 2px; margin-top: 8px; overflow: hidden; }
.progress-fill { height: 100%; background: #06D6A0; border-radius: 2px; transition: width 0.4s ease; width: 0%; }
button { width: 100%; padding: 16px; background: rgba(6,214,160,0.12); border: 1px solid rgba(6,214,160,0.3); border-radius: 14px; color: #06D6A0; font-size: 15px; letter-spacing: 1px; cursor: pointer; transition: all 0.2s; margin-top: 8px; }
button:hover { background: rgba(6,214,160,0.2); }
button:disabled { opacity: 0.4; cursor: not-allowed; }
.log { background: rgba(0,0,0,0.3); border-radius: 10px; padding: 14px; margin-top: 14px; font-size: 11px; line-height: 1.8; letter-spacing: 0.5px; max-height: 200px; overflow-y: auto; display: none; }
.log.show { display: block; }
.log .ok { color: #06D6A0; }
.log .err { color: #EF476F; }
.log .info { color: rgba(255,255,255,0.4); }
.done-box { background: rgba(6,214,160,0.08); border: 1px solid rgba(6,214,160,0.2); border-radius: 14px; padding: 20px; text-align: center; margin-top: 14px; display: none; }
.done-box.show { display: block; }
.done-box .big { font-size: 40px; margin-bottom: 10px; }
.done-box h3 { font-size: 16px; font-weight: 400; margin-bottom: 6px; color: #06D6A0; }
.done-box p { font-size: 11px; opacity: 0.4; letter-spacing: 1px; }
.warn { background: rgba(244,162,97,0.08); border: 1px solid rgba(244,162,97,0.2); border-radius: 10px; padding: 12px 14px; font-size: 11px; color: rgba(244,162,97,0.8); letter-spacing: 0.5px; line-height: 1.7; margin-bottom: 14px; }
</style>
</head>
<body>

<h1>Storage 설정</h1>
<p class="sub">감정지구본 텍스처 자동 업로드</p>

<div class="warn">
  ⚠️ 완료 후 Supabase에서 service_role 키를 재발급하세요.<br>
  Settings → API Keys → Regenerate
</div>

<div class="card">
  <div class="card-title">업로드할 파일</div>

  <div class="item">
    <div class="item-icon">🌍</div>
    <div class="item-info">
      <div class="item-name">낮 지구 텍스처</div>
      <div class="item-desc">default/day.jpg · ~2MB</div>
      <div class="progress-bar"><div class="progress-fill" id="p0"></div></div>
    </div>
    <div class="item-status" id="s0">○</div>
  </div>

  <div class="item">
    <div class="item-icon">🌃</div>
    <div class="item-info">
      <div class="item-name">야경 텍스처</div>
      <div class="item-desc">default/night.jpg · ~2MB</div>
      <div class="progress-bar"><div class="progress-fill" id="p1"></div></div>
    </div>
    <div class="item-status" id="s1">○</div>
  </div>

  <div class="item">
    <div class="item-icon">✨</div>
    <div class="item-info">
      <div class="item-name">우주 배경</div>
      <div class="item-desc">default/space.png · ~1MB</div>
      <div class="progress-bar"><div class="progress-fill" id="p2"></div></div>
    </div>
    <div class="item-status" id="s2">○</div>
  </div>
</div>

<button id="startBtn" onclick="runSetup()">🚀 설치 시작</button>

<div class="log" id="log"></div>

<div class="done-box" id="doneBox">
  <div class="big">🌍</div>
  <h3>설치 완료!</h3>
  <p>텍스처가 Supabase Storage에 저장됐어요<br>이제 감정지구본이 로컬 CDN에서 빠르게 로드돼요</p>
</div>

<script>
const SUPABASE_URL = 'https://utcufydzowykkuklrstw.supabase.co'
const SERVICE_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV0Y3VmeWR6b3d5a2t1a2xyc3R3Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3OTg4MDM0NSwiZXhwIjoyMDk1NDU2MzQ1fQ.c6ojmFaozKgkFk-DzmjFWnvBUJHem1_QixDap-TtPtI'
const BUCKET = 'textures'

const TEXTURES = [
  { name: '낮 지구', src: 'https://cdn.jsdelivr.net/npm/three-globe/example/img/earth-blue-marble.jpg', dest: 'default/day.jpg', type: 'image/jpeg' },
  { name: '야경',    src: 'https://cdn.jsdelivr.net/npm/three-globe/example/img/earth-night.jpg',       dest: 'default/night.jpg', type: 'image/jpeg' },
  { name: '우주 배경', src: 'https://cdn.jsdelivr.net/npm/three-globe/example/img/night-sky.png',      dest: 'default/space.png', type: 'image/png' },
]

function log(msg, type='info') {
  const el = document.getElementById('log')
  el.classList.add('show')
  el.innerHTML += `<div class="${type}">${msg}</div>`
  el.scrollTop = el.scrollHeight
}

function setStatus(i, icon) { document.getElementById('s'+i).textContent = icon }
function setProgress(i, pct) { document.getElementById('p'+i).style.width = pct+'%' }

async function createBucket() {
  log('버킷 생성 중...')
  const res = await fetch(`${SUPABASE_URL}/storage/v1/bucket`, {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${SERVICE_KEY}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ id: BUCKET, name: BUCKET, public: true, file_size_limit: 10485760 })
  })
  const data = await res.json()
  if (res.ok) { log('✓ 버킷 생성 완료 (public)', 'ok') }
  else if (data.error === 'The resource already exists') { log('✓ 버킷 이미 존재함', 'ok') }
  else { throw new Error('버킷 생성 실패: ' + JSON.stringify(data)) }
}

async function uploadTexture(tex, idx) {
  setStatus(idx, '⏳')
  log(`다운로드 중: ${tex.name}...`)
  setProgress(idx, 20)

  const res = await fetch(tex.src)
  if (!res.ok) throw new Error(`다운로드 실패: ${tex.src}`)
  const blob = await res.blob()
  setProgress(idx, 50)
  log(`업로드 중: ${tex.dest}...`)

  const uploadRes = await fetch(`${SUPABASE_URL}/storage/v1/object/${BUCKET}/${tex.dest}`, {
    method: 'POST',
    headers: {
      'Authorization': `Bearer ${SERVICE_KEY}`,
      'Content-Type': tex.type,
      'x-upsert': 'true'
    },
    body: blob
  })

  setProgress(idx, 90)
  if (!uploadRes.ok) {
    const err = await uploadRes.json()
    throw new Error(`업로드 실패: ${JSON.stringify(err)}`)
  }

  setProgress(idx, 100)
  setStatus(idx, '✅')
  log(`✓ ${tex.name} 완료`, 'ok')
}

async function runSetup() {
  const btn = document.getElementById('startBtn')
  btn.disabled = true
  btn.textContent = '설치 중...'

  try {
    await createBucket()

    for (let i = 0; i < TEXTURES.length; i++) {
      await uploadTexture(TEXTURES[i], i)
    }

    log('🎉 모든 파일 업로드 완료!', 'ok')
    document.getElementById('doneBox').classList.add('show')
    btn.textContent = '✅ 완료'

  } catch(err) {
    log('❌ 오류: ' + err.message, 'err')
    btn.disabled = false
    btn.textContent = '다시 시도'
  }
}
</script>
</body>
</html>
